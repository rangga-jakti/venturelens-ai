version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: venturelens_db
      POSTGRES_USER: venturelens_user
      POSTGRES_PASSWORD: venturelens_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venturelens_user -d venturelens_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://venturelens_user:venturelens_password@db:5432/venturelens_db
      DJANGO_SETTINGS_MODULE: venturelens_project.settings.development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
